<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記帳網頁</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #000;
        }
        header {
            background-color: #000;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        .container {
            padding: 1rem;
            max-width: 600px;
            margin: auto;
        }
        form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        input[type="text"], input[type="number"] {
            flex: 1 1 150px;
            padding: 0.5rem;
            border: 1px solid #000;
            background: #fff;
            color: #000;
        }
        button {
            padding: 0.5rem 1rem;
            background: #000;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #000;
            padding: 0.5rem;
            text-align: left;
        }
        @media (max-width: 600px) {
            form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>記帳網頁</h1>
    </header>
    <div class="container">
        <form id="entryForm">
            <input type="text" id="desc" placeholder="項目" required>
            <input type="number" id="amount" placeholder="金額" required>
            <button type="submit">新增</button>
        </form>
        <table id="ledger">
            <thead>
                <tr>
                    <th>項目</th>
                    <th>金額</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
    <script>
        const form = document.getElementById('entryForm');
        const tableBody = document.querySelector('#ledger tbody');
        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const desc = document.getElementById('desc').value;
            const amount = document.getElementById('amount').value;
            const row = document.createElement('tr');
            row.innerHTML = `<td>${desc}</td><td>${amount}</td>`;
            tableBody.appendChild(row);
            form.reset();
        });
    </script>
</body>
</html>
